<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Maxiapps">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
  <title>Maxiapps</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(96, 165, 250, 0.18), transparent 38%),
        linear-gradient(160deg, #020617 0%, #0f172a 45%, #111827 100%);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }
    .shell {
      width: 100%;
      max-width: 430px;
      padding: 28px 22px;
      border-radius: 32px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }
    .brand { text-align: center; margin-bottom: 24px; }
    .logo-dot {
      width: 18px; height: 18px; border-radius: 999px; margin: 0 auto 16px;
      background: linear-gradient(135deg, #38bdf8, #818cf8, #22c55e);
      box-shadow: 0 0 28px rgba(56, 189, 248, 0.45);
    }
    h1 {
      margin: 0; font-size: 2.5rem; font-weight: 750; letter-spacing: -0.04em;
    }
    .subtitle {
      margin: 10px 0 0; color: rgba(255, 255, 255, 0.72); font-size: 1rem;
    }
    .links { display: grid; gap: 14px; margin-top: 28px; }
    .button {
      display: flex; align-items: center; justify-content: space-between; width: 100%;
      padding: 18px 18px; border-radius: 20px; text-decoration: none; color: white;
      font-size: 1.08rem; font-weight: 600; background: rgba(255, 255, 255, 0.09);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
      transform: translateY(12px); opacity: 0; animation: cascade 600ms ease forwards;
    }
    .button:nth-child(2) { animation-delay: 120ms; }
    .button span:last-child { color: rgba(255, 255, 255, 0.55); font-size: 1.2rem; }
    .button:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-2px); }
    .button:active { transform: scale(0.985); }
    .install-note {
      margin-top: 20px; text-align: center; font-size: 0.92rem; color: rgba(255,255,255,0.62);
    }
    @keyframes cascade { to { transform: translateY(0); opacity: 1; } }
    @media (max-width: 420px) {
      .shell { padding: 24px 18px; border-radius: 28px; }
      h1 { font-size: 2.15rem; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="brand">
      <div class="logo-dot"></div>
      <h1 style="letter-spacing: 2px;">Maxiapps</h1>
      <p class="subtitle">A tiny launchpad for my apps.</p>
    </section>

    <nav class="links">
      <a class="button" href="https://maximilianlarsson.github.io/snake-eyes/" target="_blank" rel="noopener noreferrer">
        <span>Snake Eyes</span>
        <span>↗</span>
      </a>

      <a class="button" href="https://maximilianlarsson.github.io/Yatzy-protocol/" target="_blank" rel="noopener noreferrer">
        <span>Yatzy Protocol</span>
        <span>↗</span>
      </a>
    </nav>

    <p class="install-note">Save to your Home Screen for an app-like experience on iPhone.</p>
  </main>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js').catch(console.error);
      });
    }
  </script>
</body>
</html>
